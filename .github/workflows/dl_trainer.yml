name: Deep Learning Weekly Trainer

on:
  workflow_dispatch:

jobs:
  train-dl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Use CPU-only torch to save massive amount of time and space in CI/CD
          pip install -r requirements.dl.txt

      - name: Run MLP Trainer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd backend
          python trainer_mlp.py

      - name: Upload MLP Model
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MODEL_ARTIFACT_PATH: "model_mlp_weight.pt"
          MODEL_REMOTE_LATEST_PATH: "latest/model_mlp_weight.pt"
        run: |
          cd backend
          python upload_model.py

      - name: Run TCN-TFT Ablation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd backend
          python ablation_runner.py

      - name: Sync with remote
        run: git pull --rebase --autostash origin main

      - name: Commit Reports to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-update Deep Learning training reports & XAI weights [skip ci]"
