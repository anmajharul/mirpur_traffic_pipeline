name: Build & Deploy to Cloud Run

# ============================================================
# deploy.yml — Build + push Docker images to Artifact Registry,
#              then create/update Cloud Run Jobs.
#
# AUTH: Workload Identity Federation (WIF) — zero JSON keys.
# Organization policy iam.disableServiceAccountKeyCreation blocks
# service account JSON keys. WIF is the mandatory, secure alternative.
# Reference: Google Cloud WIF docs:
#   https://cloud.google.com/iam/docs/workload-identity-federation
#
# IAM roles follow Principle of Least Privilege:
#   roles/artifactregistry.writer  — push Docker images
#   roles/run.developer            — create/update/execute Cloud Run Jobs
#   roles/iam.serviceAccountUser  — impersonate SA on Cloud Run jobs
# ============================================================

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile.collector"
      - "Dockerfile.trainer"
      - "requirements.collector.txt"
      - "requirements.trainer.txt"
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  AR_REPO: mirpur-repo
  COLLECTOR_IMAGE: collector
  TRAINER_IMAGE: trainer
  COLLECTOR_JOB: mirpur-collector
  TRAINER_JOB: mirpur-trainer

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Build and push collector image
  # ──────────────────────────────────────────────────────────
  build-collector:
    name: "Build & Push Collector Image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # REQUIRED for Workload Identity Federation

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push collector image
        id: meta
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/${{ env.COLLECTOR_IMAGE }}:${{ github.sha }}"
          LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/${{ env.COLLECTOR_IMAGE }}:latest"

          docker build -f Dockerfile.collector -t "${IMAGE}" -t "${LATEST}" .
          docker push "${IMAGE}"
          docker push "${LATEST}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Collector image pushed: ${IMAGE}"

  # ──────────────────────────────────────────────────────────
  # JOB 2: Build and push trainer image
  # ──────────────────────────────────────────────────────────
  build-trainer:
    name: "Build & Push Trainer Image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push trainer image
        id: meta
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/${{ env.TRAINER_IMAGE }}:${{ github.sha }}"
          LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/${{ env.TRAINER_IMAGE }}:latest"

          docker build -f Dockerfile.trainer -t "${IMAGE}" -t "${LATEST}" .
          docker push "${IMAGE}"
          docker push "${LATEST}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Trainer image pushed: ${IMAGE}"

  # ──────────────────────────────────────────────────────────
  # JOB 3: Deploy/update Cloud Run Jobs
  # ──────────────────────────────────────────────────────────
  deploy-jobs:
    name: "Deploy Cloud Run Jobs"
    runs-on: ubuntu-latest
    needs: [build-collector, build-trainer]
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Collector Job (512Mi, 1 vCPU, 240s) ───────────────
      - name: Deploy collector Cloud Run Job
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: |
          COLLECTOR_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/${{ env.COLLECTOR_IMAGE }}:${{ github.sha }}"

          gcloud run jobs update ${{ env.COLLECTOR_JOB }} \
            --image="${COLLECTOR_IMAGE}" \
            --region=${{ env.GCP_REGION }} \
            --project="${PROJECT_ID}" \
            --tasks=1 \
            --max-retries=2 \
            --task-timeout=240s \
            --memory=512Mi \
            --cpu=1 \
            --set-env-vars="SUPABASE_URL=${SUPABASE_URL},SUPABASE_KEY=${SUPABASE_KEY},MAPBOX_TOKEN=${MAPBOX_TOKEN},WEATHER_API_KEY=${WEATHER_API_KEY}" \
          || \
          gcloud run jobs create ${{ env.COLLECTOR_JOB }} \
            --image="${COLLECTOR_IMAGE}" \
            --region=${{ env.GCP_REGION }} \
            --project="${PROJECT_ID}" \
            --tasks=1 \
            --max-retries=2 \
            --task-timeout=240s \
            --memory=512Mi \
            --cpu=1 \
            --set-env-vars="SUPABASE_URL=${SUPABASE_URL},SUPABASE_KEY=${SUPABASE_KEY},MAPBOX_TOKEN=${MAPBOX_TOKEN},WEATHER_API_KEY=${WEATHER_API_KEY}"

          echo "Collector job deployed/updated ✓"

      # ── Trainer Job (1Gi, 2 vCPU, 1800s) ─────────────────
      - name: Deploy trainer Cloud Run Job
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          TRAINER_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/${{ env.TRAINER_IMAGE }}:${{ github.sha }}"

          gcloud run jobs update ${{ env.TRAINER_JOB }} \
            --image="${TRAINER_IMAGE}" \
            --region=${{ env.GCP_REGION }} \
            --project="${PROJECT_ID}" \
            --tasks=1 \
            --max-retries=1 \
            --task-timeout=1800s \
            --memory=1Gi \
            --cpu=2 \
            --set-env-vars="SUPABASE_URL=${SUPABASE_URL},SUPABASE_KEY=${SUPABASE_KEY}" \
          || \
          gcloud run jobs create ${{ env.TRAINER_JOB }} \
            --image="${TRAINER_IMAGE}" \
            --region=${{ env.GCP_REGION }} \
            --project="${PROJECT_ID}" \
            --tasks=1 \
            --max-retries=1 \
            --task-timeout=1800s \
            --memory=1Gi \
            --cpu=2 \
            --set-env-vars="SUPABASE_URL=${SUPABASE_URL},SUPABASE_KEY=${SUPABASE_KEY}"

          echo "Trainer job deployed/updated ✓"

      - name: Deployment summary
        run: |
          echo "=== Deployment Complete ==="
          echo "Collector: ${{ env.COLLECTOR_JOB }} (512Mi, 1 CPU, 240s)"
          echo "Trainer:   ${{ env.TRAINER_JOB }} (1Gi, 2 CPU, 1800s)"
          echo "Region:    ${{ env.GCP_REGION }}"
          echo "SHA:       ${{ github.sha }}"
          echo "Auth:      Workload Identity Federation (no JSON keys)"
