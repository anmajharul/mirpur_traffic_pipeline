name: Scheduled Data Collection (Waze + Mapbox Fusion)

# ============================================================
# collect.yml — Single combined pipeline for Data Ingestion
# Runs every 5 minutes natively via GitHub Actions.
#
# STEP 1: Waze Cache Collection (Azure IP)
#   Runs natively on GitHub Actions to safely ping Waze servers
#   without being blocked (since GCP us-central1 IPs are blocked).
#   Writes freshly fetched speeds to Supabase 'waze_speed_cache'.
#
# STEP 2: Trigger Cloud Run Collector (GCP IP)
#   Triggers the "mirpur-collector" Cloud Run job using WIF.
#   The collector will fetch weather, Mapbox routing, and read
#   the fresh waze speeds from Supabase, fusing them together 
#   and saving to 'smart_eta_logs'.
# ============================================================

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────
  # STEP 1: Collect Waze Cache (Azure IP)
  # ──────────────────────────────────────────────────────────
  collect-waze-cache:
    name: "Step 1: Fetch Waze Dataset (Azure IP)"
    runs-on: ubuntu-latest
    timeout-minutes: 4

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.collector.txt

      - name: Install Waze dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase==2.28.3 WazeRouteCalculator==0.15 requests==2.31.0

      - name: Run Waze cache collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TZ: UTC
        run: |
          echo "=== Waze Cache Collection — $(date -u) ==="
          python waze_cache_collector.py
          echo "=== Waze cache collection complete ==="

  # ──────────────────────────────────────────────────────────
  # STEP 2: Trigger Cloud Run (GCP Datacenter IP)
  # ──────────────────────────────────────────────────────────
  trigger-collector:
    name: "Step 2: Mapbox Fusion (Cloud Run)"
    needs: collect-waze-cache # Wait for Waze to finish!
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      GCP_REGION: us-central1
      COLLECTOR_JOB: mirpur-collector

    steps:
      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute collector Cloud Run Job
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "=== Triggering Cloud Run Collector Job — $(date -u) ==="
          
          gcloud run jobs execute ${{ env.COLLECTOR_JOB }} \
            --region=${{ env.GCP_REGION }} \
            --project="${PROJECT_ID}" \
            --wait
            
          echo "=== Cloud Run Collector completed — $(date -u) ==="

      - name: Report failing job
        if: failure()
        run: |
          echo "::error::Collector Cloud Run Job failed. Check GCP logs."
