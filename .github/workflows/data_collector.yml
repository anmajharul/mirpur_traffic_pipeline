name: 1. Traffic Data Collector

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর অটোমেটিক চলবে
  workflow_dispatch: # ম্যানুয়ালি রান করার বাটন দিবে

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Data Collector Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}
        run: python backend/data_collector.py