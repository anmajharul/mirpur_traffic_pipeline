# ============================================================
# cloudbuild.yaml — GCP CI/CD Pipeline
# Automates the build and deployment of the Mirpur Traffic AI 
# pipeline to Google Cloud Run (Jobs and Services).
# ============================================================

steps:
  # ----------------------------------------------------------
  # 1. Build Docker Images
  # ----------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build-Collector-Image'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mirpur-collector', '-f', 'Dockerfile.collector', '.']
    
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build-API-Image'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mirpur-api', '-f', 'Dockerfile', '.']

  # ----------------------------------------------------------
  # 2. Push Docker Images to Google Container Registry
  # ----------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push-Collector-Image'
    args: ['push', 'gcr.io/$PROJECT_ID/mirpur-collector']
    
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push-API-Image'
    args: ['push', 'gcr.io/$PROJECT_ID/mirpur-api']

  # ----------------------------------------------------------
  # 3. Deploy Data Collector & ML Trainer as Cloud Run JOB
  # Supervisor Instruction: 512Mi memory limit and strict timeout.
  # ----------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy-Collector-Job'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'mirpur-collector-job'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mirpur-collector'
      - '--region'
      - 'us-central1'
      - '--memory'
      - '512Mi'      # Strict limit as requested
      - '--task-timeout'
      - '240s'       # Timeout set to 4 minutes to constrain long-running errors
      - '--max-retries'
      - '1'

  # ----------------------------------------------------------
  # 4. Deploy Inference API as Cloud Run SERVICE
  # Supervisor Instruction: min-instances set to 1 to avoid "Cold Starts"
  # ----------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy-Inference-Service'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mirpur-api-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mirpur-api'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--min-instances'
      - '0'          # CRITICAL: Set to 0 to stay within GCP Free Tier (accepting 3-4s cold start)

images:
  - 'gcr.io/$PROJECT_ID/mirpur-collector'
  - 'gcr.io/$PROJECT_ID/mirpur-api'


