name: 2. Groq ML Auto-Trainer

on:
  schedule:
    # ১৫ */৬ * * * মানে প্রতি ৬ ঘণ্টার ১৫ মিনিট পর রান করবে 
    # (যেমন: রাত ১২:১৫, সকাল ৬:১৫, দুপুর ১২:১৫, সন্ধ্যা ৬:১৫)
    - cron: '15 */6 * * *'
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Auto Trainer Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python backend/auto_trainer.py