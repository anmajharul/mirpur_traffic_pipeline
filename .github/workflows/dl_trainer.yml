name: Deep Learning Weekly Trainer

on:
  schedule:
    # 21:00 UTC (Friday) = 03:00 AM BDT (Saturday)
    - cron: '0 21 * * 5'
  workflow_dispatch:

jobs:
  train-dl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Use CPU-only torch to save massive amount of time and space in CI/CD
          pip install -r requirements.dl.txt

      - name: Run MLP Trainer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd backend
          python trainer_mlp.py

      - name: Run TCN-TFT Ablation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd backend
          python ablation_runner.py

      - name: Commit Reports to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-update Deep Learning training reports & XAI weights [skip ci]"
          file_pattern: "backend/reports/* backend/tcn_tft_xai_weights.csv backend/best_tcn_tft_fold*.pth backend/model_mlp_weight.pt"
