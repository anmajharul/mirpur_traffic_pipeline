name: 1. Traffic Data Research Pipeline (5-Min Interval)

on:
  push:
    branches:
      - main
  schedule:
    # প্রতি ৫ মিনিট পর পর স্বয়ংক্রিয়ভাবে রান হবে (High-Fidelity Research Data)
    - cron: '*/5 * * * *' 
  workflow_dispatch: # যখন ইচ্ছা ম্যানুয়ালি রান করার জন্য

jobs:
  collect_and_backup:
    runs-on: ubuntu-latest
    
    # রিপোজিটরিতে CSV ব্যাকআপ লেখার পারমিশন নিশ্চিত করা
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Repository Logic
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # পুরো হিস্ট্রি ফেচ করবে যাতে গিট পুশ করার সময় কনফ্লিক্ট না হয়

      - name: 2. Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Research Dependencies
        run: |
          python -m pip install --upgrade pip
          # backend ফোল্ডারের requirements.txt থেকে প্রয়োজনীয় লাইব্রেরি ইনস্টল করা
          if [ -f backend/requirements.txt ]; then 
            pip install -r backend/requirements.txt
          else
            echo "❌ Error: requirements.txt not found in backend/ folder!"
            exit 1
          fi

      - name: 4. Execute Data Fusion Script
        env:
          # শুধুমাত্র প্রয়োজনীয় এবং ভেরিফাইড কীগুলো পাঠানো হচ্ছে
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python backend/data_collector.py

      - name: 5. Synchronize CSV Backup to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # শুধুমাত্র ব্যাকআপ ফাইলটি ট্র্যাক করা
          git add backend/traffic_data_backup.csv || echo "No CSV change detected"
          
          # [skip ci] ব্যবহার করা হয়েছে যাতে এই কমিন্ট থেকে আবার অ্যাকশন ট্রিগার না হয়
          git commit -m "📊 Research Data Sync: $(date) [skip ci]" || exit 0
          
          # কনফ্লিক্ট এড়ানোর জন্য 'theirs' স্ট্র্যাটেজি (বুলিটপ্রুফ মার্চিং)
          git pull origin main --rebase -X theirs
          
          git push origin main