name: Waze Speed Cache Collector

# ============================================================
# waze_cache.yml — Runs waze_cache_collector.py DIRECTLY on
#                  GitHub Actions (NOT Cloud Run).
#
# WHY GITHUB ACTIONS (not Cloud Run) FOR WAZE:
#   Waze's unofficial routing API rejects requests from GCP
#   datacenter IP ranges (including us-central1). GitHub Actions
#   runners use Microsoft Azure IPs, which Waze currently does
#   NOT block. Cloud Run containers run on GCP IPs → blocked.
#
#   Architecture:
#     GitHub Actions (Azure IP, */5 min)
#       └── WazeRouteCalculator → Supabase waze_speed_cache (upsert)
#     Cloud Run collector job (GCP IP, */5 min)
#       └── data_collector.py reads waze_speed_cache → fuse_speeds()
#
# This makes the Waze data pipeline resilient without requiring
# residential proxies or third-party relay services.
#
# REFERENCES:
#   [1] WazeRouteCalculator — https://github.com/kovacsbalu/WazeRouteCalculator
#   [2] Bachmann et al. (2013). TR Part C, 26, 12–26.
#       DOI: 10.1016/j.trc.2012.09.003
#   [3] Vlahogianni et al. (2014). TR Part C, 43, 3–19.
#       DOI: 10.1016/j.trc.2014.01.005
# ============================================================

on:
  schedule:
    # Every 5 minutes — standard urban arterial collection cadence
    # (Vlahogianni et al. 2014)
    - cron: "*/5 * * * *"
  workflow_dispatch:   # manual trigger for debugging / backfill

jobs:
  collect-waze-cache:
    name: "Waze Cache: Collect Crowd-Sourced Speeds → Supabase"
    runs-on: ubuntu-latest
    timeout-minutes: 4   # hard kill — prevents slot starvation on consecutive fail

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          # Cache keyed on the collector requirements (includes WazeRouteCalculator)
          cache-dependency-path: requirements.collector.txt

      - name: Install Waze collector dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the subset needed for the Waze cache collector:
          # supabase, WazeRouteCalculator, requests (transitive dep)
          pip install supabase==2.28.3 WazeRouteCalculator==0.15 requests==2.31.0

      - name: Run Waze cache collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TZ: UTC
        run: |
          echo "=== Waze Cache Collection — $(date -u) ==="
          python waze_cache_collector.py
          echo "=== Waze cache collection complete — $(date -u) ==="

      - name: Annotate failure
        if: failure()
        run: |
          echo "::warning::Waze cache collection failed this cycle."
          echo "::warning::The collector job will use the last valid cache entry."
          echo "::warning::Check if WazeRouteCalculator is blocked or if Supabase is unreachable."
