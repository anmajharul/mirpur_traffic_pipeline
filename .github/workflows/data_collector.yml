name: 1. Traffic Data Collector (5-Min Interval)

on:
  push:
    branches:
      - main
  schedule:
    # প্রতি ৫ মিনিট পর পর ডেটা সংগ্রহ করবে (থিসিসের জন্য নিখুঁত গ্রাফ নিশ্চিত করতে)
    - cron: '*/5 * * * *' 
  workflow_dispatch: # ম্যানুয়ালি টেস্ট করার জন্য

jobs:
  collect:
    runs-on: ubuntu-latest
    
    # রিপোজিটরিতে CSV ব্যাকআপ লেখার পারমিশন
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Data Collector Script
        env:
          # এই ৪টি সিক্রেট অবশ্যই GitHub Settings > Secrets এ থাকতে হবে
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python backend/data_collector.py

      - name: Commit and Push CSV Backup
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # শুধুমাত্র CSV ফাইলটি অ্যাড করবে
          git add backend/traffic_data_backup.csv
          
          # [skip ci] যোগ করা হয়েছে যাতে Vercel অকারণে বিল্ড না নেয়
          git commit -m "📊 Auto-update traffic backup: $(date) [skip ci]" || exit 0
          
          # পুশ করার সময় কোনো কনফ্লিক্ট এড়াতে pull --rebase ব্যবহার করা নিরাপদ
          git pull --rebase origin main
          git push origin main