name: XGBoost ETA Model Daily Retraining

# Daily automated retraining of the XGBoost ETA prediction model.
# Implements the MLOps pipeline described in paper Section 3.4.
#
# Schedule: 01:00 BDT (Bangladesh Standard Time, UTC+6) = 19:00 UTC.
# Trains on a 30-day sliding window from Supabase smart_eta_logs.
#
# Pipeline steps:
#   1. Load + preprocess data (leakage columns stripped by data_loader.py)
#   2. Feature engineering (gap-aware lags, cyclical time encoding)
#   3. Hard leakage assertion guard (_assert_no_leakage)
#   4. 5-fold walk-forward cross-validation (MAE + RMSE + MAPE + 95% CI)
#   5. Final model fit on all 30-day data
#   6. Save portable XGBoost JSON artifact
#   7. Upload to Supabase Storage:
#        latest/model_ml_weight.json   (stable inference pointer)
#        archives/model_ml_weight_<ts>.json  (audit + rollback)
#
# Hyperparameters (inner 3-fold CV selected, no test contamination):
#   n_estimators=200, max_depth=6, learning_rate=0.05
#   Reference: Chen & Guestrin (2016), Section 3.3.
#
# REFERENCES:
# [1] Chen & Guestrin (2016). XGBoost. KDD 2016.
#     DOI: 10.1145/2939672.2939785
# [2] Bergmeir & Benítez (2012). Walk-forward CV for time series.
#     Information Sciences, 191, 192–213. DOI: 10.1016/j.ins.2011.12.028
# [3] Efron & Tibshirani (1993). Bootstrap CI. Chapman & Hall/CRC.
# [4] Kaufman et al. (2012). Leakage in data mining. ACM TKDD, 6(4).
#     DOI: 10.1145/2382577.2382579
# [5] Vlahogianni et al. (2014). TR Part C, 43, 3-19.
#     DOI: 10.1016/j.trc.2014.01.005

on:
  schedule:
    # 19:00 UTC daily = 01:00 BDT next day (UTC+6).
    # Low-traffic window minimises concept drift in training data.
    - cron: "0 19 * * *"
  workflow_dispatch:  # manual trigger for ad-hoc runs / rollback testing

jobs:
  retrain_eta_model:
    name: "XGBoost ETA Retraining: 30-day window → Supabase Storage"
    runs-on: ubuntu-latest
    timeout-minutes: 60   # XGBoost on 30-day window < 10 min; 60 is safe ceiling
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt

      - name: Run XGBoost ETA model retraining
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TZ: UTC   # walk-forward CV enforces UTC to prevent timestamp leakage
        run: |
          echo "=== XGBoost ETA Retraining — $(date -u) ==="
          python trainer_xgb.py

      - name: Verify model artifact integrity
        run: |
          test -f model_ml_weight.json || (echo "ERROR: model artifact missing" && exit 1)
          ls -lh model_ml_weight.json
          echo "SHA256: $(sha256sum model_ml_weight.json)"

      - name: Upload model artifact to Supabase Storage
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
          SUPABASE_MODEL_BUCKET: ${{ secrets.SUPABASE_MODEL_BUCKET }}
          MODEL_ARTIFACT_PATH:   model_ml_weight.json
        run: |
          echo "Uploading ETA model artifact to Supabase Storage..."
          python upload_model.py
