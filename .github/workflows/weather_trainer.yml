name: Weather Insights Daily Trainer

on:
  schedule:
    # 20:00 UTC = 02:00 AM BDT (Daily)
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  train-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.trainer.txt

      - name: Run Weather Trainer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd backend
          python train_weather_ml.py

      - name: Commit Reports to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-update Weather ML Insights reports [skip ci]"
          file_pattern: "backend/reports/*"
