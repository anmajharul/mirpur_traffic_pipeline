name: 1. Traffic Data Collector (5-Min Interval)

on:
  push:
    branches:
      - main
  schedule:
    # প্রতি ৫ মিনিট পর পর রান হবে (থিসিসের জন্য নিখুঁত গ্রাফ নিশ্চিত করতে)
    - cron: '*/5 * * * *' 
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  collect:
    runs-on: ubuntu-latest
    
    # রিপোজিটরিতে নতুন ডেটা লেখার পারমিশন নিশ্চিত করা
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # পুরো হিস্ট্রি ফেচ করবে যাতে রিবেস করতে সুবিধা হয়

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Data Collector Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python backend/data_collector.py

      - name: Commit and Push CSV Backup
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # শুধুমাত্র CSV ফাইলটি অ্যাড করবে
          git add backend/traffic_data_backup.csv
          
          # [skip ci] যোগ করা হয়েছে যাতে Vercel অকারণে বিল্ড না নেয়
          git commit -m "📊 Auto-update traffic backup: $(date) [skip ci]" || exit 0
          
          # কনফ্লিক্ট এড়াতে 'theirs' স্ট্র্যাটেজি ব্যবহার করা হয়েছে (বুলিটপ্রুফ ফিক্স)
          git pull origin main --rebase -X theirs
          
          git push origin main