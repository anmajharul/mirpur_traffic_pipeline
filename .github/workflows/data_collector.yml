name: 1. Traffic Data Collector

on:
  push:
    branches:
      - main  # তুমি কোড পুশ করার সাথে সাথেই এটা একবার অটো রান করবে
  schedule:
    # এরপর থেকে প্রতি ৬ ঘণ্টা পর পর অটোমেটিক চলবে (রাত ১২টা, সকাল ৬টা, দুপুর ১২টা, সন্ধ্যা ৬টা)
    - cron: '0 */6 * * *'
  workflow_dispatch: # ফিউচারে কখনো ম্যানুয়ালি টেস্ট করার দরকার হলে এই বাটনটা কাজে লাগবে

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Data Collector Script
        # এই env ব্লকটি খুবই জরুরি, এটি ছাড়া পাইথন ফাইল সুপাবেস বা টমটমকে চিনতে পারবে না
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: python backend/data_collector.py